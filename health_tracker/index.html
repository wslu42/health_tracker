<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日血壓追蹤</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <p class="eyebrow">個人健康紀錄</p>
      <h1>每日血壓追蹤</h1>
      <p class="disclaimer">本工具僅供個人追蹤使用，不能取代專業醫療建議。</p>
    </header>

    <main class="layout">
      <section class="card input-card" aria-labelledby="entry-title">
        <div class="card-header">
          <h2 id="entry-title">新增紀錄</h2>
          <p>輸入量測資料後，系統會自動以目前裝置的本地時間儲存。</p>
        </div>

        <form id="record-form" class="record-form" novalidate>
          <div id="form-warning" class="warning hidden" role="alert" aria-live="polite"></div>

          <div class="field-grid">
            <label class="field">
              <span>收縮壓</span>
              <input id="systolic" name="systolic" type="number" inputmode="numeric" min="60" max="250" required>
            </label>

            <label class="field">
              <span>舒張壓</span>
              <input id="diastolic" name="diastolic" type="number" inputmode="numeric" min="30" max="150" required>
            </label>

            <label class="field">
              <span>脈搏</span>
              <input id="pulse" name="pulse" type="number" inputmode="numeric" min="30" max="220" required>
            </label>

            <label class="field">
              <span>用餐狀態</span>
              <select id="meal-status" name="mealStatus">
                <option value="before_meal">飯前</option>
                <option value="after_meal">飯後</option>
                <option value="unknown" selected>不確定</option>
              </select>
            </label>

            <label class="field">
              <span>是否服藥</span>
              <select id="medication-taken" name="medicationTaken">
                <option value="true">是</option>
                <option value="false" selected>否</option>
              </select>
            </label>

            <label class="field field-wide">
              <span>藥量或用藥備註</span>
              <input id="medication-dose" name="medicationDose" type="text" maxlength="120" placeholder="例如：早餐後 5 mg">
            </label>

            <fieldset class="field field-wide checklist-group">
              <legend>症狀勾選</legend>
              <label class="check-item">
                <input id="symptom-dizzy" name="hadDizziness" type="checkbox">
                <span>今天是否有頭暈</span>
              </label>
              <label class="check-item">
                <input id="symptom-breathless" name="hadBreathlessness" type="checkbox">
                <span>是否會喘</span>
              </label>
              <label class="check-item">
                <input id="symptom-chest-tightness" name="hadChestTightness" type="checkbox">
                <span>是否胸悶</span>
              </label>
              <label class="check-item">
                <input id="vision-change" name="hadVisionChange" type="checkbox">
                <span>是否有視力變化</span>
              </label>
            </fieldset>

            <label class="field">
              <span>體力變化</span>
              <select id="energy-change" name="energyChange">
                <option value="unchanged" selected>差不多</option>
                <option value="better">變好</option>
                <option value="worse">變差</option>
              </select>
            </label>

            <label class="field">
              <span>量測狀態</span>
              <select id="measurement-context" name="measurementContext">
                <option value="resting" selected>休息後量</option>
                <option value="post_exercise">運動後量</option>
                <option value="unknown">不確定</option>
              </select>
            </label>

            <label class="field field-wide">
              <span>備註</span>
              <textarea id="note" name="note" rows="3" maxlength="240" placeholder="可記錄這次量測需要特別注意的事情"></textarea>
            </label>
          </div>

          <div class="button-row">
            <button type="submit" class="primary-button">儲存紀錄</button>
            <button type="reset" class="secondary-button">清除表單</button>
          </div>
        </form>
      </section>

      <section class="card latest-card" aria-labelledby="latest-title">
        <div class="card-header">
          <h2 id="latest-title">最新紀錄</h2>
          <p>最近一次儲存的量測資料。</p>
        </div>
        <div id="latest-record"></div>
      </section>

      <section class="card records-card" aria-labelledby="records-title">
        <div class="card-header card-header-split">
          <div>
            <h2 id="records-title">近期紀錄</h2>
            <p>資料會儲存在目前使用的瀏覽器中。</p>
          </div>
          <div class="button-group export-group">
            <button id="export-json" type="button" class="secondary-button">匯出 JSON</button>
            <button id="export-csv" type="button" class="secondary-button">匯出 CSV</button>
            <label class="secondary-button import-button" for="import-json">匯入 JSON</label>
            <input id="import-json" type="file" accept="application/json">
          </div>
        </div>

        <div class="table-wrap">
          <table class="records-table">
            <thead>
              <tr>
                <th>時間</th>
                <th>血壓</th>
                <th>脈搏</th>
                <th>狀態</th>
                <th>症狀</th>
                <th>用藥 / 備註</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="records-table-body"></tbody>
          </table>
        </div>
      </section>

      <section class="card chart-card" aria-labelledby="chart-title">
        <div class="card-header card-header-split">
          <div>
            <h2 id="chart-title">趨勢圖表</h2>
            <p>查看血壓與脈搏隨時間變化的情況。</p>
          </div>
          <label class="chart-filter">
            <span>顯示範圍</span>
            <select id="chart-range">
              <option value="7">近 7 天</option>
              <option value="30">近 30 天</option>
              <option value="all">全部紀錄</option>
            </select>
          </label>
        </div>
        <div class="chart-wrap">
          <canvas id="records-chart" aria-label="血壓與脈搏趨勢圖"></canvas>
        </div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
